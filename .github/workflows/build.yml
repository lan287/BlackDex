name: Build APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build (no signing)
        run: |
          ./gradlew :app:assembleBlackDex32Debug :app:assembleBlackDex64Debug \
            --stacktrace --no-daemon

      - name: Collect artefacts
        if: always()
        run: |
          mkdir -p out
          find app/build/outputs/apk -name '*.apk' -exec cp -v {} out/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blackdex-apk
          path: out/*.apk
          if-no-files-found: error
